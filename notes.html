<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Allen Xu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Allen的小站</a>
            <div style="display: flex; align-items: center;">
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题"><span class="theme-icon">🌙</span></button>
                <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="about.html">About</a></li>
                <li><a href="writings.html">Writing</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="reading.html">Reading</a></li>
                <li><a href="notes.html" class="active">Notes</a></li>
                <li><a href="fun.html">Fun</a></li>
            </ul>
        </div>
    </nav>

    <main class="page">
        <div class="container">
            <header class="page-header">
                <h1>知识笔记</h1>
                <p class="page-subtitle">我的数字花园</p>
            </header>

            <div class="content">
                <div class="notes-grid">
                    <a href="notes/music.html" class="note-card">
                        <h3>🎵 古典音乐</h3>
                        <p>贝多芬、肖邦、莫扎特...</p>
                        <span class="note-count">点击探索 →</span>
                    </a>
                    <a href="notes/f1.html" class="note-card">
                        <h3>🏎️ F1 世界一级方程式</h3>
                        <p>2026 新规、车手、车队分析</p>
                        <span class="note-count">点击探索 →</span>
                    </a>
                </div>

                <div class="section-block" style="margin-top: 3rem;">
                    <blockquote class="quote">
                        <p>「笔记不是收藏，而是用自己的话重新表达。」</p>
                    </blockquote>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© Allen Xu · All thoughts are mine.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>

    <script>
    function toggleTheme() {
        const h = document.documentElement;
        const t = h.getAttribute("data-theme") === "dark" ? "light" : "dark";
        h.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
        const icon = document.querySelector(".theme-icon");
        if(icon) icon.textContent = t === "dark" ? "☀️" : "🌙";
    }
    function toggleMenu() {
        const nav = document.getElementById("navLinks");
        if(nav) nav.classList.toggle("active");
    }
    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);
    const icon = document.querySelector(".theme-icon");
    if(icon) icon.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    </script>

</body>
</html>
